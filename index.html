<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ServiceFlow | Appointments Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6d28d9">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f0eeff;
      --surface: #ffffff;
      --surface2: #f7f5ff;
      --surface3: #edeafc;
      --text: #1a1333;
      --text2: #5c5478;
      --text3: #9b93b8;
      --border: rgba(109,40,217,0.12);
      --border2: rgba(109,40,217,0.22);
      --accent: #6d28d9;
      --accent2: #8b5cf6;
      --accent-bg: #ede9fe;
      --accent-text: #4c1d95;
      --green-bg: #dcfce7;
      --green-text: #14532d;
      --green-border: rgba(22,163,74,0.25);
      --amber-bg: #fef9c3;
      --amber-text: #713f12;
      --amber-border: rgba(202,138,4,0.25);
      --red-bg: #fee2e2;
      --red-text: #7f1d1d;
      --red-border: rgba(220,38,38,0.2);
      --blue-bg: #dbeafe;
      --blue-text: #1e3a5f;
      --blue-border: rgba(37,99,235,0.2);
      --shadow-sm: 0 1px 4px rgba(109,40,217,0.08), 0 2px 8px rgba(109,40,217,0.06);
      --shadow-md: 0 4px 12px rgba(109,40,217,0.10), 0 2px 6px rgba(109,40,217,0.08);
      --shadow-lg: 0 8px 24px rgba(109,40,217,0.13), 0 3px 8px rgba(109,40,217,0.09);
      --shadow-btn: 0 2px 6px rgba(109,40,217,0.18), 0 1px 3px rgba(109,40,217,0.12);
      --r: 14px;
      --r-sm: 9px;
      --r-pill: 999px;
    }

    [data-theme="dark"] {
      --bg: #0f0c1a;
      --surface: #1c1729;
      --surface2: #241e35;
      --surface3: #2d2645;
      --text: #f0ecff;
      --text2: #a899cc;
      --text3: #5e5478;
      --border: rgba(139,92,246,0.15);
      --border2: rgba(139,92,246,0.28);
      --accent: #a78bfa;
      --accent2: #c4b5fd;
      --accent-bg: #2d1f5e;
      --accent-text: #ddd6fe;
      --green-bg: #14532d;
      --green-text: #bbf7d0;
      --green-border: rgba(74,222,128,0.2);
      --amber-bg: #451a03;
      --amber-text: #fde68a;
      --amber-border: rgba(251,191,36,0.2);
      --red-bg: #450a0a;
      --red-text: #fecaca;
      --red-border: rgba(248,113,113,0.2);
      --blue-bg: #1e3a5f;
      --blue-text: #bfdbfe;
      --blue-border: rgba(96,165,250,0.2);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5), 0 3px 8px rgba(0,0,0,0.35);
      --shadow-btn: 0 2px 6px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
      transition: background 0.25s, color 0.25s;
    }

    .app { max-width: 1400px; margin: 0 auto; }

    /* NAV */
    .nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 8px 10px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 8px;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .nav-links { display: flex; gap: 6px; overflow: auto; scrollbar-width: none; flex: 1; min-width: 0; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-link {
      padding: 8px 13px;
      border-radius: var(--r-pill);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--text2);
      border: 1px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .nav-link.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-btn); }
    .nav-link:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .nav-link i { font-size: 15px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .theme-toggle {
      width: 36px; height: 36px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--accent-bg); color: var(--accent); }

    /* HEADER */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .brand h1 { font-size: clamp(1.3rem, 5vw, 1.9rem); font-weight: 700; color: var(--text); line-height: 1.2; }
    .brand p { color: var(--text2); margin-top: 5px; font-size: 0.82rem; }
    .header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--r);
      min-width: 80px;
      box-shadow: var(--shadow-sm);
    }
    .stat-label { display: block; font-size: 0.67rem; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
    .stat-number { font-size: 1.4rem; font-weight: 700; color: var(--text); }

    /* KPI GRID */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    @media (min-width: 640px) { .kpi-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .kpi-icon {
      width: 32px; height: 32px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
      font-size: 17px;
    }
    .ki-p { background: var(--accent-bg); color: var(--accent); }
    .ki-b { background: var(--blue-bg); color: var(--blue-text); }
    .ki-g { background: var(--green-bg); color: var(--green-text); }
    .ki-a { background: var(--amber-bg); color: var(--amber-text); }
    .kpi-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); font-weight: 600; margin-bottom: 4px; }
    .kpi-value { font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-sub { font-size: 0.74rem; margin-top: 5px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
    .kpi-sub i { font-size: 12px; }

    /* ACTION BAR */
    .action-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    @media (min-width: 600px) { .action-bar { flex-direction: row; align-items: center; } }
    .search-wrapper { position: relative; flex: 1; }
    .search-wrapper i.search-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; }
    .search-wrapper input {
      width: 100%;
      padding: 11px 13px 11px 38px;
      border-radius: var(--r-pill);
      font-size: 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      outline: none;
      transition: all 0.2s;
    }
    .search-wrapper input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(139,92,246,0.15), var(--shadow-sm); }
    .search-wrapper input::placeholder { color: var(--text3); }
    .filter-group { display: flex; gap: 7px; flex-wrap: wrap; }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 8px 14px;
      border-radius: var(--r-pill);
      font-size: 0.79rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      box-shadow: var(--shadow-sm);
    }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: transparent; box-shadow: var(--shadow-btn); }
    .filter-chip:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .filter-chip i { font-size: 13px; }

    /* CARDS GRID */
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 700px) { .cards-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); } }

    .appt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: all 0.22s ease;
      box-shadow: var(--shadow-sm);
    }
    .appt-card:hover { box-shadow: var(--shadow-lg); border-color: var(--border2); transform: translateY(-2px); }
    .appt-card.done { background: var(--green-bg); border-color: var(--green-border); }

    .card-header { padding: 16px 18px; cursor: pointer; transition: background 0.15s; }
    .card-header:hover { background: var(--surface2); }

    .name-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .cust-name { font-size: 1rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 7px; }
    .expand-i { font-size: 13px; color: var(--text3); transition: transform 0.22s; display: inline-block; }
    .expand-i.open { transform: rotate(90deg); }

    .sbadge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-pill); font-size: 0.68rem; font-weight: 600; }
    .s-done { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
    .s-pend { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }

    .card-preview { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.8rem; color: var(--text2); }
    .prev-item { display: inline-flex; align-items: center; gap: 4px; }
    .prev-item i { font-size: 13px; color: var(--text3); }

    /* CARD DETAILS */
    .card-details { padding: 0 18px 18px; border-top: 1px solid var(--border); animation: fd 0.2s ease; }
    @keyframes fd { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .details-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .d-item { border-radius: var(--r-sm); padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); }
    .d-label { font-size: 0.64rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
    .d-label i { font-size: 12px; }
    .d-val { font-weight: 600; font-size: 0.875rem; color: var(--text); }
    .d-val.amt { color: var(--accent); font-size: 1rem; }

    /* ACTION BUTTONS */
    .act-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .abtn {
      border: 1px solid;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      cursor: pointer;
      transition: all 0.18s;
      display: inline-flex; align-items: center; gap: 5px;
      box-shadow: var(--shadow-btn);
    }
    .abtn i { font-size: 13px; }
    .abtn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .abtn:active { transform: scale(0.97); }
    .ab-edit { color: var(--blue-text); border-color: var(--blue-border); background: var(--blue-bg); }
    .ab-del { color: var(--red-text); border-color: var(--red-border); background: var(--red-bg); }
    .ab-done { color: var(--green-text); border-color: var(--green-border); background: var(--green-bg); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 50px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow-sm); }
    .empty-icon { font-size: 36px; color: var(--text3); margin-bottom: 10px; }
    .empty-state h3 { font-size: 1rem; font-weight: 600; margin-bottom: 5px; color: var(--text); }
    .empty-state p { color: var(--text2); font-size: 0.83rem; }

    /* FAB */
    .fab-wrap { display: flex; justify-content: flex-end; margin-top: 20px; padding-bottom: 8px; }
    .fab {
      background: var(--accent);
      color: #fff;
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: none;
      font-size: 22px;
      box-shadow: var(--shadow-lg), 0 4px 14px rgba(109,40,217,0.35);
      transition: all 0.2s;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(109,40,217,0.4); }
    .fab:active { transform: scale(0.96); }

    /* INSTALL BUTTON */
    .install-btn {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-btn);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .install-btn.show { display: inline-flex; }
    .install-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .install-btn i { font-size: 14px; }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-links">
      <a href="index.html" class="nav-link active">
        <i class="ti ti-calendar-event" aria-hidden="true"></i><span>Appointments</span>
      </a>
      <a href="reports.html" class="nav-link">
        <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Reports</span>
      </a>
      <a href="add.html" class="nav-link">
        <i class="ti ti-plus" aria-hidden="true"></i><span>Add new</span>
      </a>
    </div>
    <div class="nav-right">
      <button id="installBtn" class="install-btn" aria-label="Install app">
        <i class="ti ti-download" aria-hidden="true"></i><span>Install</span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="ti ti-moon" id="themeIcon" aria-hidden="true"></i>
      </button>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="header-row">
    <div class="brand">
      <h1>ServiceFlow</h1>
      <p>Smart appointment tracking · Revenue insights</p>
    </div>
    <div class="header-stats">
      <div class="stat-badge">
        <span class="stat-label">Today</span>
        <span class="stat-number" id="todayCount">0</span>
      </div>
      <div class="stat-badge">
        <span class="stat-label">Pending</span>
        <span class="stat-number" id="pendingCount">0</span>
      </div>
    </div>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon ki-p"><i class="ti ti-currency-dollar" aria-hidden="true"></i></div>
      <div class="kpi-label">Total revenue</div>
      <div class="kpi-value" id="totalCollectedKpi">ZMW 0</div>
      <div class="kpi-sub"><i class="ti ti-check" aria-hidden="true"></i>Completed</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon ki-b"><i class="ti ti-clock" aria-hidden="true"></i></div>
      <div class="kpi-label">Active</div>
      <div class="kpi-value" id="activeAppointmentsKpi">0</div>
      <div class="kpi-sub"><i class="ti ti-loader" aria-hidden="true"></i>Pending</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon ki-g"><i class="ti ti-circle-check" aria-hidden="true"></i></div>
      <div class="kpi-label">Completed</div>
      <div class="kpi-value" id="completedJobsKpi">0</div>
      <div class="kpi-sub"><i class="ti ti-star" aria-hidden="true"></i>Services done</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon ki-a"><i class="ti ti-trending-up" aria-hidden="true"></i></div>
      <div class="kpi-label">This month</div>
      <div class="kpi-value" id="monthRevenueKpi">ZMW 0</div>
      <div class="kpi-sub"><i class="ti ti-arrow-up-right" aria-hidden="true"></i>Revenue</div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <div class="search-wrapper">
      <i class="ti ti-search search-ic" aria-hidden="true"></i>
      <input type="text" id="searchBar" placeholder="Search customer, phone, service…">
    </div>
    <div class="filter-group">
      <div class="filter-chip active" data-filter="all"><i class="ti ti-list" aria-hidden="true"></i>All</div>
      <div class="filter-chip" data-filter="pending"><i class="ti ti-clock" aria-hidden="true"></i>Pending</div>
      <div class="filter-chip" data-filter="completed"><i class="ti ti-circle-check" aria-hidden="true"></i>Done</div>
    </div>
  </div>

  <!-- CARDS -->
  <div id="cardsGrid" class="cards-grid"></div>

  <!-- FAB -->
  <div class="fab-wrap">
    <button class="fab" id="fabBtn" aria-label="Add new appointment">
      <i class="ti ti-plus" aria-hidden="true"></i>
    </button>
  </div>

</div>

<script>
  let appointments = JSON.parse(localStorage.getItem("serviceflow_appointments")) || [];
  let currentFilter = "all", expandedId = null, deferredPrompt;

  const grid = document.getElementById("cardsGrid");
  const searchInput = document.getElementById("searchBar");

  function fmtFull(d) {
    if (!d) return "Not scheduled";
    return new Date(d).toLocaleString(undefined, { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function isToday(d) { return d?.slice(0, 10) === new Date().toISOString().slice(0, 10); }
  function isThisMonth(d) {
    let t = new Date(), a = new Date(d);
    return a.getMonth() === t.getMonth() && a.getFullYear() === t.getFullYear();
  }
  function esc(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  function updateMetrics() {
    let comp = appointments.filter(a => a.completed);
    let pend = appointments.filter(a => !a.completed);
    let total = comp.reduce((s, a) => s + parseFloat(a.amount || 0), 0);
    let mRev = appointments.filter(a => a.completed && isThisMonth(a.datetime)).reduce((s, a) => s + parseFloat(a.amount || 0), 0);
    document.getElementById("totalCollectedKpi").textContent = "ZMW " + total.toFixed(2);
    document.getElementById("activeAppointmentsKpi").textContent = pend.length;
    document.getElementById("completedJobsKpi").textContent = comp.length;
    document.getElementById("monthRevenueKpi").textContent = "ZMW " + mRev.toFixed(2);
    document.getElementById("todayCount").textContent = appointments.filter(a => isToday(a.datetime)).length;
    document.getElementById("pendingCount").textContent = pend.length;
  }

  function toggleExpand(id) { expandedId = expandedId === id ? null : id; renderCards(); }

  function handleDelete(id) {
    if (confirm("Delete this appointment?")) {
      appointments = appointments.filter(a => a.id != id);
      if (expandedId === id) expandedId = null;
      localStorage.setItem("serviceflow_appointments", JSON.stringify(appointments));
      renderCards();
    }
  }

  function handleToggle(id) {
    let idx = appointments.findIndex(a => a.id == id);
    if (idx !== -1) {
      appointments[idx].completed = !appointments[idx].completed;
      localStorage.setItem("serviceflow_appointments", JSON.stringify(appointments));
      renderCards();
    }
  }

  function renderCards() {
    let q = searchInput.value.trim().toLowerCase();
    let list = appointments.filter(a =>
      !q || a.name.toLowerCase().includes(q) || a.phone.includes(q) || a.service.toLowerCase().includes(q)
    );
    if (currentFilter === "pending") list = list.filter(a => !a.completed);
    if (currentFilter === "completed") list = list.filter(a => a.completed);

    grid.innerHTML = "";

    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="ti ti-calendar-off" aria-hidden="true"></i></div>
          <h3>No appointments found</h3>
          <p>Tap the + button below to add your first appointment.</p>
        </div>`;
      updateMetrics();
      return;
    }

    list.forEach(appt => {
      let isExp = expandedId === appt.id;
      let amt = parseFloat(appt.amount || 0).toFixed(2);

      let card = document.createElement('div');
      card.className = 'appt-card' + (appt.completed ? ' done' : '');

      let hdr = document.createElement('div');
      hdr.className = 'card-header';
      hdr.dataset.id = appt.id;
      hdr.innerHTML = `
        <div class="name-row">
          <div class="cust-name">
            <i class="ti ti-chevron-right expand-i${isExp ? ' open' : ''}" aria-hidden="true"></i>
            ${esc(appt.name)}
          </div>
          <div class="sbadge ${appt.completed ? 's-done' : 's-pend'}">
            <i class="ti ti-${appt.completed ? 'circle-check' : 'clock'}" aria-hidden="true" style="font-size:11px"></i>
            ${appt.completed ? 'Done' : 'Pending'}
          </div>
        </div>
        <div class="card-preview">
          <div class="prev-item"><i class="ti ti-phone" aria-hidden="true"></i>${esc(appt.phone)}</div>
          <div class="prev-item"><i class="ti ti-tool" aria-hidden="true"></i>${esc(appt.service)}</div>
          <div class="prev-item"><i class="ti ti-currency-dollar" aria-hidden="true"></i>ZMW ${amt}</div>
        </div>`;
      card.appendChild(hdr);

      if (isExp) {
        let det = document.createElement('div');
        det.className = 'card-details';
        det.innerHTML = `
          <div class="details-grid">
            <div class="d-item">
              <div class="d-label"><i class="ti ti-phone" aria-hidden="true"></i>Contact</div>
              <div class="d-val">${esc(appt.phone)}</div>
            </div>
            <div class="d-item">
              <div class="d-label"><i class="ti ti-tool" aria-hidden="true"></i>Service</div>
              <div class="d-val">${esc(appt.service)}</div>
            </div>
            <div class="d-item" style="grid-column:1/-1">
              <div class="d-label"><i class="ti ti-calendar-event" aria-hidden="true"></i>Date & time</div>
              <div class="d-val" style="font-size:.82rem">${fmtFull(appt.datetime)}</div>
            </div>
            <div class="d-item">
              <div class="d-label"><i class="ti ti-currency-dollar" aria-hidden="true"></i>Amount</div>
              <div class="d-val amt">ZMW ${amt}</div>
            </div>
            <div class="d-item">
              <div class="d-label"><i class="ti ti-info-circle" aria-hidden="true"></i>Status</div>
              <div class="d-val">
                <span class="sbadge ${appt.completed ? 's-done' : 's-pend'}">
                  <i class="ti ti-${appt.completed ? 'circle-check' : 'clock'}" aria-hidden="true" style="font-size:11px"></i>
                  ${appt.completed ? 'Done' : 'Pending'}
                </span>
              </div>
            </div>
          </div>
          <div class="act-btns">
            <button class="abtn ab-edit" data-id="${appt.id}">
              <i class="ti ti-pencil" aria-hidden="true"></i>Edit
            </button>
            <button class="abtn ab-del" data-id="${appt.id}">
              <i class="ti ti-trash" aria-hidden="true"></i>Delete
            </button>
            <button class="abtn ab-done" data-id="${appt.id}">
              <i class="ti ti-${appt.completed ? 'arrow-back-up' : 'circle-check'}" aria-hidden="true"></i>
              ${appt.completed ? 'Undo' : 'Mark done'}
            </button>
          </div>`;
        card.appendChild(det);
      }

      grid.appendChild(card);
    });

    grid.querySelectorAll('.card-header').forEach(h =>
      h.addEventListener('click', e => { e.stopPropagation(); let id = parseInt(h.dataset.id); if (!isNaN(id)) toggleExpand(id); })
    );
    grid.querySelectorAll('.ab-edit').forEach(b =>
      b.addEventListener('click', e => { e.stopPropagation(); window.location.href = `add.html?edit=${b.dataset.id}`; })
    );
    grid.querySelectorAll('.ab-del').forEach(b =>
      b.addEventListener('click', e => { e.stopPropagation(); handleDelete(b.dataset.id); })
    );
    grid.querySelectorAll('.ab-done').forEach(b =>
      b.addEventListener('click', e => { e.stopPropagation(); handleToggle(b.dataset.id); })
    );

    updateMetrics();
  }

  // FILTERS
  document.querySelectorAll(".filter-chip").forEach(c => {
    c.addEventListener("click", () => {
      document.querySelectorAll(".filter-chip").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      currentFilter = c.dataset.filter;
      expandedId = null;
      renderCards();
    });
  });

  // SEARCH
  searchInput.addEventListener("input", () => { expandedId = null; renderCards(); });

  // FAB
  document.getElementById("fabBtn").addEventListener("click", () => window.location.href = "add.html");

  // THEME TOGGLE
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");
  let dark = localStorage.getItem("sf_theme") === "dark";

  function applyTheme() {
    document.body.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("app").setAttribute("data-theme", dark ? "dark" : "light");
    themeIcon.className = dark ? "ti ti-sun" : "ti ti-moon";
  }

  themeToggle.addEventListener("click", () => {
    dark = !dark;
    localStorage.setItem("sf_theme", dark ? "dark" : "light");
    applyTheme();
  });

  applyTheme();

  // PWA INSTALL
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBtn').classList.remove('show');
    }
  });

  // CROSS-TAB SYNC
  window.addEventListener('storage', e => {
    if (e.key === 'serviceflow_appointments') {
      appointments = JSON.parse(e.newValue) || [];
      renderCards();
    }
  });

  renderCards();
</script>
</body>
</html>
