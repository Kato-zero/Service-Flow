<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .offline-container {
      background: white;
      border-radius: 28px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 { font-size: 2rem; margin-bottom: 16px; color: #0f172a; }
    p { color: #64748b; margin-bottom: 24px; line-height: 1.6; }
    .offline-icon { font-size: 4rem; margin-bottom: 20px; }
    button {
      background: #0f172a;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1e293b; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📴</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection. Once you're back online, all your data will sync automatically.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
