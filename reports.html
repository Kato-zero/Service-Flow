<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ServiceFlow | Yearly Reports</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6d28d9">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f5f7ff; --primary: #6d28d9; --primary-dark: #5b21b6; --secondary: #8b5cf6; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; --success: #16a34a; --shadow: 0 10px 30px rgba(15,23,42,0.06); }
    body { font-family: 'Inter', system-ui, sans-serif; background: radial-gradient(circle at top right, #ede9fe 0%, transparent 30%), radial-gradient(circle at bottom left, #dbeafe 0%, transparent 35%), var(--bg); color: var(--text); min-height: 100vh; padding: 18px; }
    .app-container { max-width: 1200px; margin: 0 auto; }
    .icon { width: 18px; height: 18px; display: inline-flex; vertical-align: middle; margin-right: 4px; }
    .nav-bar { background: rgba(255,255,255,0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.4); border-radius: 999px; padding: 10px 14px; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: center; gap: 14px; box-shadow: var(--shadow); position: sticky; top: 12px; z-index: 100; }
    .nav-links { display: flex; gap: 10px; overflow: auto; scrollbar-width: none; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-link { padding: 12px 18px; border-radius: 999px; text-decoration: none; font-weight: 600; transition: 0.25s ease; background: #f8fafc; color: #334155; white-space: nowrap; font-size: 0.92rem; display: inline-flex; align-items: center; gap: 8px; }
    .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .nav-link.active .icon { filter: brightness(0) invert(1); }
    .nav-link:hover:not(.active) { background: #eef2ff; color: var(--primary); }
    .install-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 18px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 0.9rem; display: none; align-items: center; gap: 8px; }
    .install-btn.show { display: inline-flex; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 800; background: linear-gradient(135deg, #111827, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 12px; }
    .year-selector { background: rgba(255,255,255,0.8); border-radius: 999px; padding: 8px 20px; margin-bottom: 24px; display: inline-flex; align-items: center; gap: 12px; }
    .year-selector select { padding: 10px 16px; border-radius: 40px; border: 1px solid var(--border); font-weight: 600; background: white; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .summary-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(14px); border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow); }
    .summary-card h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .summary-card .value { font-size: 2.2rem; font-weight: 900; color: var(--primary-dark); }
    .monthly-table { background: rgba(255,255,255,0.9); backdrop-filter: blur(14px); border-radius: 28px; overflow: hidden; border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #fafafa; font-weight: 800; color: #475569; }
    tr:hover { background: #faf7ff; }
    .amount-positive { font-weight: 800; color: var(--primary); }
    @media (max-width: 680px) { th, td { padding: 12px 14px; } .summary-cards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-container">
  <div class="nav-bar">
    <div class="nav-links">
      <a href="index.html" class="nav-link"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Appointments</a>
      <a href="reports.html" class="nav-link active"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12v6a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>Yearly Reports</a>
      <a href="add.html" class="nav-link"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>Add New</a>
    </div>
    <button id="installBtn" class="install-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Install App</button>
  </div>
  <div class="page-header"><h1><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12v6a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>Yearly Reports</h1><p>Annual revenue analysis and monthly breakdown</p></div>
  <div class="year-selector"><span>📅 Select Year:</span><select id="yearSelect"></select></div>
  <div class="summary-cards"><div class="summary-card"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Total Revenue</h3><div class="value" id="totalRevenue">ZMW 0</div></div><div class="summary-card"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Completed Jobs</h3><div class="value" id="totalJobs">0</div></div><div class="summary-card"><h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Average per Month</h3><div class="value" id="avgMonthly">ZMW 0</div></div></div>
  <div class="monthly-table"><table><thead><tr><th>Month</th><th>Completed Jobs</th><th>Total Revenue</th><th>Average per Job</th></tr></thead><tbody id="reportBody"></tbody></table></div>
</div>
<script>
  let appointments = JSON.parse(localStorage.getItem("serviceflow_appointments")) || [];
  let deferredPrompt;
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  function getYears() { let years = [...new Set(appointments.filter(a=>a.completed && a.datetime).map(a=>new Date(a.datetime).getFullYear()))]; if(years.length===0) years=[new Date().getFullYear()]; return years.sort((a,b)=>b-a); }
  function populateYearSelect() { let select = document.getElementById("yearSelect"); select.innerHTML = ""; getYears().forEach(y=>{ let opt = document.createElement("option"); opt.value=y; opt.textContent=y; select.appendChild(opt); }); let currentYear = new Date().getFullYear(); if(getYears().includes(currentYear)) select.value=currentYear; }
  function renderReports() { let year = parseInt(document.getElementById("yearSelect").value); let filtered = appointments.filter(a=>a.completed && a.datetime && new Date(a.datetime).getFullYear()===year); let monthlyData = Array(12).fill().map(()=>({count:0, revenue:0})); filtered.forEach(a=>{ let month = new Date(a.datetime).getMonth(); let amt = parseFloat(a.amount||0); monthlyData[month].count++; monthlyData[month].revenue+=amt; }); let totalRev = monthlyData.reduce((s,m)=>s+m.revenue,0); let totalJobs = monthlyData.reduce((s,m)=>s+m.count,0); let avgMonthlyVal = totalJobs>0 ? totalRev/12 : 0; document.getElementById("totalRevenue").innerText = `ZMW ${totalRev.toFixed(2)}`; document.getElementById("totalJobs").innerText = totalJobs; document.getElementById("avgMonthly").innerText = `ZMW ${avgMonthlyVal.toFixed(2)}`; let tbody = document.getElementById("reportBody"); tbody.innerHTML = ""; for(let i=0;i<12;i++){ let avgJob = monthlyData[i].count>0 ? monthlyData[i].revenue/monthlyData[i].count : 0; let row = `<tr><td><strong>${monthNames[i]}</strong></td><td>${monthlyData[i].count}</td><td class="amount-positive">ZMW ${monthlyData[i].revenue.toFixed(2)}</td><td>ZMW ${avgJob.toFixed(2)}</td></tr>`; tbody.innerHTML += row; } }
  document.getElementById("yearSelect").addEventListener("change", renderReports);
  window.addEventListener('storage', (e)=>{ if(e.key==='serviceflow_appointments'){ appointments=JSON.parse(e.newValue)||[]; populateYearSelect(); renderReports(); } });
  function refreshData(){ appointments = JSON.parse(localStorage.getItem("serviceflow_appointments")) || []; populateYearSelect(); renderReports(); }
  window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt=e; document.getElementById('installBtn').classList.add('show'); });
  document.getElementById('installBtn').addEventListener('click', async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; document.getElementById('installBtn').classList.remove('show'); } });
  refreshData();
</script>
</body>
</html>
