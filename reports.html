<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ServiceFlow | Yearly Financial Reports</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      padding: 24px 20px;
    }

    .app-container {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Navigation */
    .nav-bar {
      background: white;
      border-radius: 60px;
      padding: 8px 20px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .nav-links {
      display: flex;
      gap: 12px;
    }
    .nav-link {
      padding: 10px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      background: #f1f5f9;
      color: #334155;
    }
    .nav-link.active {
      background: #0f172a;
      color: white;
    }
    .nav-link:hover:not(.active) {
      background: #e2e8f0;
    }

    /* Business Selector */
    .business-selector {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 28px;
      padding: 20px 28px;
      margin-bottom: 32px;
      color: white;
    }
    .business-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .business-info h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .business-type-select {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    .business-type-select option {
      background: #1e293b;
      color: white;
    }

    /* Year Selector */
    .year-selector {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .year-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .year-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .year-btn:hover {
      background: #e2e8f0;
    }
    .current-year {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }
    .summary-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
