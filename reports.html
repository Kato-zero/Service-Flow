<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ServiceFlow | Yearly Reports</title>

  <meta name="theme-color" content="#6d28d9">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root{
      --bg:#f5f7ff;
      --card:#ffffff;
      --primary:#6d28d9;
      --secondary:#8b5cf6;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --shadow:0 10px 30px rgba(15,23,42,0.06);
      --radius:24px;
    }

    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background: radial-gradient(circle at top right,#ede9fe 0%,transparent 30%),
                  radial-gradient(circle at bottom left,#dbeafe 0%,transparent 35%),
                  var(--bg);
      color:var(--text);
      padding:18px;
      min-height:100vh;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    /* NAV */
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.8);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .nav a{
      text-decoration:none;
      font-weight:700;
      padding:10px 16px;
      border-radius:999px;
      color:#334155;
      background:#f8fafc;
    }

    .nav a.active{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
    }

    /* HEADER */
    .header{
      margin:20px 0;
    }

    .header h1{
      font-size:2rem;
      font-weight:900;
      background:linear-gradient(135deg,#111827,#7c3aed);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .header p{
      color:var(--muted);
      margin-top:6px;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .card{
      background:rgba(255,255,255,0.85);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.5);
    }

    .card h3{
      font-size:0.75rem;
      text-transform:uppercase;
      letter-spacing:0.08em;
      color:var(--muted);
      margin-bottom:10px;
    }

    .card .value{
      font-size:2rem;
      font-weight:900;
    }

    /* CHART */
    .chart-card{
      margin-top:20px;
      padding:20px;
      border-radius:30px;
      background:rgba(255,255,255,0.85);
      box-shadow:var(--shadow);
    }

    canvas{
      width:100%;
      height:320px;
    }

    /* TABLE */
    .table-card{
      margin-top:20px;
      background:rgba(255,255,255,0.85);
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:700px;
    }

    th,td{
      padding:14px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
    }

    th{
      background:#fafafa;
      font-size:0.8rem;
      text-transform:uppercase;
      color:#475569;
    }

    @media(max-width:768px){
      canvas{height:260px;}
    }
  </style>
</head>

<body>
<div class="container">

  <!-- NAV -->
  <div class="nav">
    <div>
      <a href="index.html">Appointments</a>
      <a href="reports.html" class="active">Reports</a>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <h1>Yearly Business Reports</h1>
    <p>Revenue insights · Performance overview · Monthly trends</p>
  </div>

  <!-- STATS -->
  <div class="grid">

    <div class="card">
      <h3>Total Revenue</h3>
      <div class="value" id="totalRevenue">$0</div>
    </div>

    <div class="card">
      <h3>Completed Jobs</h3>
      <div class="value" id="completedJobs">0</div>
    </div>

    <div class="card">
      <h3>Pending Jobs</h3>
      <div class="value" id="pendingJobs">0</div>
    </div>

    <div class="card">
      <h3>This Year Revenue</h3>
      <div class="value" id="yearRevenue">$0</div>
    </div>

  </div>

  <!-- CHART -->
  <div class="chart-card">
    <h3 style="margin-bottom:10px;color:#64748b;font-size:0.8rem;">Monthly Revenue Chart</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th>Revenue</th>
          <th>Completed</th>
        </tr>
      </thead>
      <tbody id="reportTable"></tbody>
    </table>
  </div>

</div>

<script>
  let appointments = JSON.parse(localStorage.getItem("serviceflow_appointments")) || [];

  const now = new Date();
  const currentYear = now.getFullYear();

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  function getMonthData(){
    let data = Array.from({length:12}, () => ({
      revenue:0,
      completed:0
    }));

    appointments.forEach(a=>{
      if(!a.completed) return;

      const d = new Date(a.datetime);
      if(d.getFullYear() !== currentYear) return;

      const m = d.getMonth();
      data[m].revenue += parseFloat(a.amount || 0);
      data[m].completed += 1;
    });

    return data;
  }

  function renderStats(data){

    const totalRevenue = data.reduce((s,m)=>s+m.revenue,0);
    const completed = appointments.filter(a=>a.completed).length;
    const pending = appointments.filter(a=>!a.completed).length;

    document.getElementById("totalRevenue").innerText = `$${totalRevenue.toFixed(2)}`;
    document.getElementById("completedJobs").innerText = completed;
    document.getElementById("pendingJobs").innerText = pending;
    document.getElementById("yearRevenue").innerText = `$${totalRevenue.toFixed(2)}`;
  }

  function renderTable(data){

    const tbody = document.getElementById("reportTable");
    tbody.innerHTML = "";

    data.forEach((m,i)=>{

      const row = document.createElement("tr");

      row.innerHTML = `
        <td><strong>${months[i]}</strong></td>
        <td>$${m.revenue.toFixed(2)}</td>
        <td>${m.completed}</td>
      `;

      tbody.appendChild(row);
    });
  }

  function drawChart(data){

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2,2);

    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;

    const max = Math.max(...data.map(d=>d.revenue), 1);
    const barWidth = w / data.length - 10;

    ctx.clearRect(0,0,w,h);

    data.forEach((d,i)=>{

      const x = i * (barWidth + 10);
      const barHeight = (d.revenue / max) * (h - 40);

      ctx.fillStyle = "#6d28d9";
      ctx.fillRect(x, h - barHeight - 20, barWidth, barHeight);

      ctx.fillStyle = "#64748b";
      ctx.font = "10px sans-serif";
      ctx.fillText(months[i], x, h - 5);
    });
  }

  const data = getMonthData();

  renderStats(data);
  renderTable(data);
  drawChart(data);

</script>

</body>
</html>
