<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ServiceFlow | Yearly Reports</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6d28d9">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f0eeff;
      --surface: #ffffff;
      --surface2: #f7f5ff;
      --surface3: #edeafc;
      --text: #1a1333;
      --text2: #5c5478;
      --text3: #9b93b8;
      --border: rgba(109,40,217,0.12);
      --border2: rgba(109,40,217,0.22);
      --accent: #6d28d9;
      --accent2: #8b5cf6;
      --accent-bg: #ede9fe;
      --accent-text: #4c1d95;
      --green-bg: #dcfce7;
      --green-text: #14532d;
      --green-border: rgba(22,163,74,0.25);
      --amber-bg: #fef9c3;
      --amber-text: #713f12;
      --amber-border: rgba(202,138,4,0.25);
      --red-bg: #fee2e2;
      --red-text: #7f1d1d;
      --red-border: rgba(220,38,38,0.2);
      --blue-bg: #dbeafe;
      --blue-text: #1e3a5f;
      --blue-border: rgba(37,99,235,0.2);
      --shadow-sm: 0 1px 4px rgba(109,40,217,0.08), 0 2px 8px rgba(109,40,217,0.06);
      --shadow-md: 0 4px 12px rgba(109,40,217,0.10), 0 2px 6px rgba(109,40,217,0.08);
      --shadow-lg: 0 8px 24px rgba(109,40,217,0.13), 0 3px 8px rgba(109,40,217,0.09);
      --shadow-btn: 0 2px 6px rgba(109,40,217,0.18), 0 1px 3px rgba(109,40,217,0.12);
      --r: 14px;
      --r-sm: 9px;
      --r-pill: 999px;
    }

    [data-theme="dark"] {
      --bg: #0f0c1a;
      --surface: #1c1729;
      --surface2: #241e35;
      --surface3: #2d2645;
      --text: #f0ecff;
      --text2: #a899cc;
      --text3: #5e5478;
      --border: rgba(139,92,246,0.15);
      --border2: rgba(139,92,246,0.28);
      --accent: #a78bfa;
      --accent2: #c4b5fd;
      --accent-bg: #2d1f5e;
      --accent-text: #ddd6fe;
      --green-bg: #14532d;
      --green-text: #bbf7d0;
      --green-border: rgba(74,222,128,0.2);
      --amber-bg: #451a03;
      --amber-text: #fde68a;
      --amber-border: rgba(251,191,36,0.2);
      --red-bg: #450a0a;
      --red-text: #fecaca;
      --red-border: rgba(248,113,113,0.2);
      --blue-bg: #1e3a5f;
      --blue-text: #bfdbfe;
      --blue-border: rgba(96,165,250,0.2);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5), 0 3px 8px rgba(0,0,0,0.35);
      --shadow-btn: 0 2px 6px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
      transition: background 0.25s, color 0.25s;
    }

    .app { max-width: 1200px; margin: 0 auto; }

    /* NAV */
    .nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 8px 10px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 8px;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .nav-links { display: flex; gap: 6px; overflow: auto; scrollbar-width: none; flex: 1; min-width: 0; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-link {
      padding: 8px 13px;
      border-radius: var(--r-pill);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--text2);
      border: 1px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .nav-link.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-btn); }
    .nav-link:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .nav-link i { font-size: 15px; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .theme-toggle {
      width: 36px; height: 36px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--accent-bg); color: var(--accent); }

    .install-btn {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-btn);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .install-btn.show { display: inline-flex; }
    .install-btn i { font-size: 14px; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 18px; }
    .page-header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.2;
    }
    .page-header h1 i { font-size: clamp(1.2rem, 4vw, 1.6rem); color: var(--accent); }
    .page-header p { color: var(--text2); margin-top: 6px; font-size: 0.875rem; }

    /* YEAR SELECTOR */
    .year-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .year-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .year-label i { font-size: 16px; color: var(--accent); }

    #yearSelect {
      padding: 9px 14px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border2);
      font-weight: 600;
      font-size: 0.875rem;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    #yearSelect:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }

    /* SUMMARY CARDS */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (min-width: 640px) { .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }
    .summary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .summary-card-icon {
      width: 32px; height: 32px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      margin-bottom: 10px;
    }
    .si-p { background: var(--accent-bg); color: var(--accent); }
    .si-g { background: var(--green-bg); color: var(--green-text); }
    .si-b { background: var(--blue-bg); color: var(--blue-text); }

    .summary-card h3 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .summary-card .value {
      font-size: clamp(1.2rem, 3.5vw, 1.75rem);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* TABLE SECTION */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .table-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .table-header i { font-size: 17px; color: var(--accent); }

    /* Scrollable on mobile */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }
    thead tr { background: var(--surface2); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 13px 16px;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    td:first-child { font-weight: 600; color: var(--text); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.has-data td:first-child { color: var(--accent); }

    .rev-value { font-weight: 700; color: var(--accent); }
    .zero { color: var(--text3); }

    .month-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .month-bar {
      height: 6px;
      border-radius: 999px;
      background: var(--accent-bg);
      flex: 1;
      min-width: 40px;
      overflow: hidden;
    }
    .month-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    /* EMPTY STATE */
    .empty-row td {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      font-size: 0.875rem;
    }
    .empty-row i { font-size: 28px; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-links">
      <a href="index.html" class="nav-link">
        <i class="ti ti-calendar-event" aria-hidden="true"></i><span>Appointments</span>
      </a>
      <a href="reports.html" class="nav-link active">
        <i class="ti ti-chart-bar" aria-hidden="true"></i><span>Reports</span>
      </a>
      <a href="add.html" class="nav-link">
        <i class="ti ti-plus" aria-hidden="true"></i><span>Add new</span>
      </a>
    </div>
    <div class="nav-right">
      <button id="installBtn" class="install-btn" aria-label="Install app">
        <i class="ti ti-download" aria-hidden="true"></i><span>Install</span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="ti ti-moon" id="themeIcon" aria-hidden="true"></i>
      </button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>
      <i class="ti ti-chart-bar" aria-hidden="true"></i>
      Yearly reports
    </h1>
    <p>Annual revenue analysis and monthly breakdown</p>
  </div>

  <!-- YEAR SELECTOR -->
  <div class="year-bar">
    <span class="year-label"><i class="ti ti-calendar" aria-hidden="true"></i>Select year</span>
    <select id="yearSelect" aria-label="Select year"></select>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-card-icon si-p"><i class="ti ti-currency-dollar" aria-hidden="true"></i></div>
      <h3>Total revenue</h3>
      <div class="value" id="totalRevenue">ZMW 0.00</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-icon si-g"><i class="ti ti-circle-check" aria-hidden="true"></i></div>
      <h3>Completed jobs</h3>
      <div class="value" id="totalJobs">0</div>
    </div>
    <div class="summary-card" style="grid-column: 1 / -1;">
      <div class="summary-card-icon si-b"><i class="ti ti-trending-up" aria-hidden="true"></i></div>
      <h3>Average per month</h3>
      <div class="value" id="avgMonthly">ZMW 0.00</div>
    </div>
  </div>

  <!-- MONTHLY TABLE -->
  <div class="table-section">
    <div class="table-header">
      <i class="ti ti-table" aria-hidden="true"></i>
      Monthly breakdown
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Month</th>
            <th>Completed jobs</th>
            <th>Total revenue</th>
            <th>Avg per job</th>
            <th>Revenue bar</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let appointments = JSON.parse(localStorage.getItem("serviceflow_appointments")) || [];
  let deferredPrompt;

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  // THEME
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");
  let dark = localStorage.getItem("sf_theme") === "dark";

  function applyTheme() {
    document.body.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("app").setAttribute("data-theme", dark ? "dark" : "light");
    themeIcon.className = dark ? "ti ti-sun" : "ti ti-moon";
  }
  themeToggle.addEventListener("click", () => {
    dark = !dark;
    localStorage.setItem("sf_theme", dark ? "dark" : "light");
    applyTheme();
  });
  applyTheme();

  // Fix the "avg per month" summary card to span full width only on 2-col layout
  function fixSummaryGrid() {
    const third = document.querySelector(".summary-grid .summary-card:last-child");
    if (window.innerWidth >= 640) {
      third.style.gridColumn = "";
    } else {
      third.style.gridColumn = "1 / -1";
    }
  }
  window.addEventListener("resize", fixSummaryGrid);
  fixSummaryGrid();

  function getYears() {
    let years = [...new Set(
      appointments
        .filter(a => a.completed && a.datetime)
        .map(a => new Date(a.datetime).getFullYear())
    )];
    if (years.length === 0) years = [new Date().getFullYear()];
    return years.sort((a, b) => b - a);
  }

  function populateYearSelect() {
    let select = document.getElementById("yearSelect");
    let current = select.value;
    select.innerHTML = "";
    getYears().forEach(y => {
      let opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      select.appendChild(opt);
    });
    if (current && getYears().includes(parseInt(current))) {
      select.value = current;
    } else {
      let cy = new Date().getFullYear();
      if (getYears().includes(cy)) select.value = cy;
    }
  }

  function renderReports() {
    let year = parseInt(document.getElementById("yearSelect").value);
    let filtered = appointments.filter(a =>
      a.completed && a.datetime && new Date(a.datetime).getFullYear() === year
    );

    let monthlyData = Array(12).fill(null).map(() => ({ count: 0, revenue: 0 }));
    filtered.forEach(a => {
      let m = new Date(a.datetime).getMonth();
      monthlyData[m].count++;
      monthlyData[m].revenue += parseFloat(a.amount || 0);
    });

    let totalRev = monthlyData.reduce((s, m) => s + m.revenue, 0);
    let totalJobs = monthlyData.reduce((s, m) => s + m.count, 0);
    let avgMonthly = totalRev / 12;
    let maxRev = Math.max(...monthlyData.map(m => m.revenue), 1);

    document.getElementById("totalRevenue").textContent = "ZMW " + totalRev.toFixed(2);
    document.getElementById("totalJobs").textContent = totalJobs;
    document.getElementById("avgMonthly").textContent = "ZMW " + avgMonthly.toFixed(2);

    let tbody = document.getElementById("reportBody");
    tbody.innerHTML = "";

    if (totalJobs === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5"><i class="ti ti-chart-bar-off" aria-hidden="true"></i>No completed appointments for ${year}</td></tr>`;
      return;
    }

    for (let i = 0; i < 12; i++) {
      let d = monthlyData[i];
      let avgJob = d.count > 0 ? d.revenue / d.count : 0;
      let barPct = maxRev > 0 ? (d.revenue / maxRev) * 100 : 0;
      let hasData = d.count > 0;

      let row = document.createElement("tr");
      if (hasData) row.classList.add("has-data");
      row.innerHTML = `
        <td>${monthNames[i]}</td>
        <td class="${hasData ? '' : 'zero'}">${d.count}</td>
        <td class="${hasData ? 'rev-value' : 'zero'}">ZMW ${d.revenue.toFixed(2)}</td>
        <td class="${hasData ? '' : 'zero'}">ZMW ${avgJob.toFixed(2)}</td>
        <td>
          <div class="month-bar-wrap">
            <div class="month-bar">
              <div class="month-bar-fill" style="width:${barPct.toFixed(1)}%"></div>
            </div>
            <span style="font-size:0.72rem;color:var(--text3);min-width:32px">${barPct.toFixed(0)}%</span>
          </div>
        </td>`;
      tbody.appendChild(row);
    }
  }

  document.getElementById("yearSelect").addEventListener("change", renderReports);

  window.addEventListener('storage', e => {
    if (e.key === 'serviceflow_appointments') {
      appointments = JSON.parse(e.newValue) || [];
      populateYearSelect();
      renderReports();
    }
  });

  // PWA INSTALL
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBtn').classList.remove('show');
    }
  });

  populateYearSelect();
  renderReports();
</script>
</body>
</html>
